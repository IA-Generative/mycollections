apiVersion: v1
kind: ConfigMap
metadata:
  name: myrag-config
  namespace: miraiku
data:
  # OpenRAG backend lives on a Scaleway VM (HTTPS public, auth via Bearer token).
  OPENRAG_URL: "https://api.openrag.fake-domain.name"
  # Shared Keycloak (same cluster, same namespace).
  KEYCLOAK_URL: "https://mysso.fake-domain.name"
  KEYCLOAK_REALM: "openwebui"
  # Client service-account du BACKEND pour l'API admin Keycloak (synchro KC->OpenRAG).
  # Doit avoir les rôles realm-management (query-groups/users, view/manage-users).
  # Le secret est injecté via myrag-secrets (KEYCLOAK_CLIENT_SECRET). NB : le FRONT
  # utilise son propre client public 'myrag-front' (défaut Nuxt, pas cette clé).
  KEYCLOAK_CLIENT_ID: "myrag-admin"
  # Public URL of this MyRAG instance (used by server-generated links).
  MYRAG_PUBLIC_URL: "https://mycollections.fake-domain.name"
  # Graph viewer — kept in-cluster for now.
  GRAPHRAG_VIEWER_URL: "http://bridge.miraiku.svc.cluster.local:8081/graph"
  # Auth on backend API (OIDC introspection).
  AUTH_ENABLED: "true"
  # Suite Numerique Drive (file source). Auth via Keycloak client_credentials
  # on the dedicated confidential client 'mycollections-drive'; the secret
  # is injected separately from myrag-secrets.
  DRIVE_URL: "https://mesfichiers.fake-domain.name"
  DRIVE_CLIENT_ID: "mycollections-drive"
  # Open WebUI — same cluster, used by the publish flow to register models
  # as aliases. Internal service DNS to avoid a round-trip through the
  # public ingress. Auth is per-user: the admin's OWUI API key is sent
  # with each publish request.
  OWUI_URL: "http://openwebui.miraiku.svc.cluster.local"
