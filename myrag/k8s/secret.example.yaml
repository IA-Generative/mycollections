apiVersion: v1
kind: Secret
metadata:
  name: myrag-secrets
  namespace: miraiku
type: Opaque
stringData:
  # OpenRAG VM bearer token.
  OPENRAG_ADMIN_TOKEN: "CHANGE_ME"
  # Keycloak confidential client (server-to-server admin API).
  KEYCLOAK_CLIENT_SECRET: "CHANGE_ME"
  # Optional: Legifrance PISTE API for Legifrance ingest source.
  LEGIFRANCE_CLIENT_ID: ""
  LEGIFRANCE_CLIENT_SECRET: ""
  # NOTE: DATABASE_URL is NOT stored here. It is composed at pod-start from
  # owui-socle-secrets.POSTGRES_USER/POSTGRES_PASSWORD in deployment-backend.yaml.
