apiVersion: v1
kind: Secret
metadata:
  name: myrag-secrets
  namespace: miraiku
type: Opaque
stringData:
  # OpenRAG VM bearer token.
  OPENRAG_ADMIN_TOKEN: "CHANGE_ME"
  # Keycloak confidential client (server-to-server admin API).
  KEYCLOAK_CLIENT_SECRET: "CHANGE_ME"
  # Optional: Legifrance PISTE API for Legifrance ingest source.
  LEGIFRANCE_CLIENT_ID: ""
  LEGIFRANCE_CLIENT_SECRET: ""
  # PostgreSQL DSN for MyRAG (reuse the shared postgres in the same namespace).
  # Template: postgresql+asyncpg://app:<POSTGRES_APP_PASSWORD>@postgres.miraiku.svc.cluster.local:5432/myrag
  DATABASE_URL: "CHANGE_ME"
