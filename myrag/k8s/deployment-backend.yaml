apiVersion: apps/v1
kind: Deployment
metadata:
  name: myrag-backend
  namespace: miraiku
  labels:
    app: myrag-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myrag-backend
  template:
    metadata:
      labels:
        app: myrag-backend
    spec:
      imagePullSecrets:
        - name: owui-registry
      containers:
        - name: backend
          image: rg.fr-par.scw.cloud/funcscwnspricelessmontalcinhiacgnzi/myrag-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8200
          env:
            - name: APP_TITLE
              value: "Mes collections (beta)"
            # From ConfigMap
            - name: OPENRAG_URL
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: OPENRAG_URL
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: KEYCLOAK_CLIENT_ID
            - name: MYRAG_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: MYRAG_PUBLIC_URL
            - name: AUTH_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: AUTH_ENABLED
            - name: GRAPHRAG_VIEWER_URL
              valueFrom:
                configMapKeyRef:
                  name: myrag-config
                  key: GRAPHRAG_VIEWER_URL
                  optional: true
            # From Secret
            - name: OPENRAG_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: myrag-secrets
                  key: OPENRAG_ADMIN_TOKEN
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: myrag-secrets
                  key: KEYCLOAK_CLIENT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: myrag-secrets
                  key: DATABASE_URL
            - name: LEGIFRANCE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: myrag-secrets
                  key: LEGIFRANCE_CLIENT_ID
                  optional: true
            - name: LEGIFRANCE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: myrag-secrets
                  key: LEGIFRANCE_CLIENT_SECRET
                  optional: true
            - name: DATA_DIR
              value: "/app/data"
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8200
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: myrag-sources
