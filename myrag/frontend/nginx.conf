server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # When behind an HTTPS ingress, nginx would otherwise emit absolute
    # Location headers like "http://host:3000/auth/callback/" which leak
    # the internal port and scheme. Relative redirects let the browser
    # keep the public URL intact.
    absolute_redirect off;
    port_in_redirect off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;
    gzip_min_length 1024;

    # Hashed assets — long-lived immutable cache.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached: it references the currently-deployed
    # hashed asset bundle, so any stale copy sends the browser back to an
    # obsolete chunk map that still points to old CSS/JS.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback for all other routes (also served as index.html — same
    # no-cache treatment applies because try_files rewrites to it).
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
