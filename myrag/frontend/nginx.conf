server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # When behind an HTTPS ingress, nginx would otherwise emit absolute
    # Location headers like "http://host:3000/auth/callback/" which leak
    # the internal port and scheme. Relative redirects let the browser
    # keep the public URL intact.
    absolute_redirect off;
    port_in_redirect off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;
    gzip_min_length 1024;

    # Hashed assets — long-lived cache.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for all other routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
